<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#000" />
  <title>Cue · camera-test</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #000; color: #fff;
                 font-family: -apple-system, system-ui, sans-serif; }
    * { box-sizing: border-box; }
    #v {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      background: #000;
      z-index: 0;
    }
    #ui {
      position: fixed; left: 12px; right: 12px;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 20px);
      z-index: 2;
      display: flex; flex-direction: column; gap: 10px;
    }
    #err {
      background: #b00020; color: #fff;
      border-radius: 12px; padding: 14px;
      font-size: 15px; font-weight: 600;
      display: none;
    }
    button {
      font: inherit; padding: 14px 18px;
      border: 0; border-radius: 12px;
      background: #E6B566; color: #1a120a;
      font-weight: 700; font-size: 16px;
    }
    #start { display: none; }
    a { color: #E6B566; }
    p { text-align: center; margin: 0; font-size: 12px; opacity: 0.7; }
  </style>
  <!-- Vercel Web Analytics — automatic visitor / pageview tracking. -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
  <video id="v" autoplay muted playsinline webkit-playsinline></video>
  <div id="ui">
    <div id="err"></div>
    <button id="start">Tap to start camera</button>
    <p><a href="/">← back to app</a></p>
  </div>

<script>
(() => {
  const v = document.getElementById('v');
  const errEl = document.getElementById('err');
  const startBtn = document.getElementById('start');
  let stream = null;

  function showErr(msg) { errEl.textContent = msg; errEl.style.display = 'block'; }
  function clearErr() { errEl.style.display = 'none'; errEl.textContent = ''; }
  function fmt(e) { return !e ? '(none)' : (e.name || 'Error') + ': ' + (e.message || String(e)); }

  function applyAttrs() {
    v.setAttribute('playsinline', '');
    v.setAttribute('webkit-playsinline', '');
    v.setAttribute('muted', '');
    v.setAttribute('autoplay', '');
    v.playsInline = true; v.muted = true; v.autoplay = true;
  }

  async function playWithRetries(maxAttempts = 4) {
    for (let i = 0; i < maxAttempts; i++) {
      try { await v.play(); return true; }
      catch (err) {
        if (err && err.name === 'NotAllowedError') return false;
        await new Promise(r => setTimeout(r, 120 + i * 180));
      }
    }
    return false;
  }

  async function start() {
    clearErr();
    if (!window.isSecureContext) {
      showErr('Page is not in a secure context. Camera requires https://.');
      return;
    }
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      showErr('getUserMedia is not available in this browser.');
      return;
    }

    if (stream) {
      stream.getTracks().forEach(t => { try { t.stop(); } catch(e){} });
      stream = null;
      v.srcObject = null;
    }

    applyAttrs();

    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment' },
        audio: false
      });
    } catch (e1) {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
      } catch (e2) {
        showErr('getUserMedia failed — ' + fmt(e2));
        return;
      }
    }

    v.srcObject = stream;

    await new Promise((resolve) => {
      if (v.readyState >= 2 && v.videoWidth > 0) return resolve();
      let done = false;
      const finish = () => { if (done) return; done = true; cleanup(); resolve(); };
      const cleanup = () => {
        v.removeEventListener('loadedmetadata', finish);
        v.removeEventListener('loadeddata', finish);
        v.removeEventListener('canplay', finish);
      };
      v.addEventListener('loadedmetadata', finish);
      v.addEventListener('loadeddata', finish);
      v.addEventListener('canplay', finish);
      setTimeout(finish, 2000);
    });

    const ok = await playWithRetries();
    if (ok) startBtn.style.display = 'none';
    else startBtn.style.display = '';
  }

  startBtn.addEventListener('click', start);
  start();
})();
</script>
</body>
</html>
